    <body class="bg-gradient-sena">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">

                            <div class="col-md-4 d-flex justify-content-center align-items-center"style="width: 40%; display: flex; align-items: center; justify-content: center; background-color: #f5f5f5;">
                                <a>
                                    <img src="img/fondo.png" class="logo-large animate__animated " alt="Logo LOG-IN">
                                </a>
                            </div>

                            <div class="col-md-8">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">¡Bienvenido!</h1>
                                    </div>

                                    <form class="user" id="loginForm" action="Login.php" method="post">
                                        <div class="form-group">
                                            <input type="email" class="form-control form-control-user" id="loginEmail" name="correo" placeholder="Correo" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user" id="loginPassword" name="password" placeholder="Contraseña" required>
                                        </div>
                                        <center>
                                         <Button type="submit" class="btn btn-primary btn-user "> 
                                            iniciar sesión
                                         </Button>
                                         </center>
                                    </form>

                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="Register.html">¡Crear cuenta!</a>
                                        <br>
                                        <a class="small" href="Forgot-password.html">¿Olvidaste tu contraseña?</a>
                                        <br>
                                        <a class="small" href="acceso.html">Acceso QR</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de validación -->
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            let email = document.getElementById("loginEmail").value.trim();
            let password = document.getElementById("loginPassword").value.trim();

            if (!email || !password) {
                e.preventDefault();
                alert("Por favor completa correo y contraseña.");
            }
        });
    </script>

</body>
