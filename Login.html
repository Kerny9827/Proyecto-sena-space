<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Login Sena Space">
    <meta name="author" content="">
    <link rel="icon" href="img/icono3.png">
    <title>Sena Space - Login</title>

    <!-- Custom fonts -->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,700,900" rel="stylesheet">

    <!-- Custom styles -->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <!-- Animaciones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>


    <body style="background: linear-gradient(180deg, #2e8b57 10%, #1e3c72 100%);">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">

                            <!-- Logo -->
                            <div class="col-md-4 d-flex justify-content-center align-items-center">
                                <a href="Login.html">
                                    <img src="img/fondo.png" style="max-width: 250px; height: auto; border-radius: 25%;" alt="Logo Sena Space" class="animate__animated animate__pulse animate__infinite">
                                </a>
                            </div>

                            <!-- Formulario -->
                            <div class="col-md-8">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">¡Bienvenido!</h1>
                                    </div>

                                    <form class="user" id="loginForm">
                                        <div class="form-group">
                                            <input type="email" class="form-control form-control-user" id="loginEmail" placeholder="Correo" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user" id="loginPassword" placeholder="Contraseña" required>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Iniciar sesión
                                        </button>
                                    </form>

                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="register.html">¡Crear cuenta!</a>
                                        <br>
                                        <a class="small" href="forgot-password">¿Olvidaste tu contraseña?</a>
                                        <br>
                                        <a class="small" href="404.html">Escane QR</a>
                                    </div>
                                </div>
                            </div>
                            <!-- Fin formulario -->

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de validación -->
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let email = document.getElementById("loginEmail").value.trim();
            let password = document.getElementById("loginPassword").value.trim();

            let savedEmail = localStorage.getItem("userEmail");
            let savedPassword = localStorage.getItem("userPassword");
            let savedName = localStorage.getItem("userName");

            if (email === savedEmail && password === savedPassword) {
                alert("✅ Bienvenido " + savedName);

                // Guardar sesión activa
                localStorage.setItem("isLoggedIn", "true");

                // Redirigir a página principal
                window.location.href = "index.html";
            } else {
                alert("❌ Correo o contraseña incorrectos.");
            }
        });
    </script>

</body>
</html>
