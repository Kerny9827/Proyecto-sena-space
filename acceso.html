<!-- VALIDACIÓN LOGIN -->
<script>
document.getElementById("loginForm").addEventListener("submit", function (e) {
    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if (!email || !password) {
        e.preventDefault();
        alert("Por favor completa correo y contraseña.");
    }
});
</script>

<!-- SCRIPT QR -->
<script>
function mostrarQR() {
    document.getElementById("qr-container").style.display = "block";

    const scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (qrCodeMessage) => {
            document.getElementById("resultado").innerText = "QR detectado: " + qrCodeMessage;

            //  AUTO LLENAR EL CORREO (MEJORA PRO)
            if (qrCodeMessage.includes("@")) {
                document.getElementById("loginEmail").value = qrCodeMessage;
            }

            //  REDIRECCIÓN SI ES LINK
            if (qrCodeMessage.startsWith("http")) {
                window.location.href = qrCodeMessage;
            }

            scanner.stop();
        },
        (errorMessage) => {
            // errores ignorados
        }
    );
}
</script>
