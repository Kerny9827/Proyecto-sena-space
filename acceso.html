<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="img/icono3.png">
    <title>LOG-IN - Acceso</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,700,900" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-gradient-sena">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <div class="row">

                        <div class="col-md-4 d-flex justify-content-center align-items-center" style="background-color: #f5f5f5;">
                            <img src="img/fondo.png" class="img-fluid p-3" alt="Logo">
                        </div>

                        <div class="col-md-8">
                            <div class="p-5">
                                <div class="text-center">
                                    <h1 class="h4 text-gray-900 mb-4">Control de Acceso QR</h1>
                                </div>

                                <div class="text-center mb-4">
                                    <button class="btn btn-success btn-lg btn-block" onclick="mostrarQR()">
                                        <i class="fas fa-qrcode"></i> Escanear Código QR
                                    </button>

                                   
                                </div>
                                
                                <div id="qr-container" style="display:none; margin-top:20px; text-align:center;">
                                    <h5 class="text-primary">Por favor, presente su código QR frente a la cámara</h5>
                                    <div id="reader" style="width:100%; max-width:300px; margin:auto;"></div>
                                    <div id="resultado" class="alert alert-info mt-3" style="display:none;"></div>
                                </div>

                                <div class="text-center mt-4">
                                 <br ><br>
                                    <button class="btn btn-secondary btn-lg btn-block" onclick="window.location.href='Login.html'">
                                        <i class="fas "></i> Volver al Login
                                    </button>
                                </div>

                                <div id="acciones-acceso" style="display: none;" class="mt-4 animate__animated animate__fadeIn">
                                    <hr>
                                    <h5 class="text-center text-gray-900 mb-3">Seleccione el Tipo de Registro:</h5>
                                    <button type="button" class="btn btn-primary btn-user btn-block mb-2" onclick="registrarAcceso('ingreso')">
                                        <i class="fas fa-sign-in-alt"></i> Registrar Ingreso
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-user btn-block" onclick="registrarAcceso('salida')">
                                        <i class="fas fa-sign-out-alt"></i> Registrar Salida
                                    </button>
                                </div>

                                <form class="user d-none" id="loginForm" action="login.php" method="post">
                                    <input type="hidden" id="loginEmail" value="">
                                    <input type="hidden" id="loginPassword" value="">
                                </form>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let cedulaEscaneada = null;
let scanner = null; // Guardar la instancia globalmente

function mostrarQR() {
    // Mostrar contenedor del lector y ocultar acciones previas
    document.getElementById("qr-container").style.display = "block";
    document.getElementById("acciones-acceso").style.display = "none";
    document.getElementById("resultado").style.display = "none";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (qrCodeMessage) => {
            // Se asume que el QR es puramente el número de documento/cédula
            cedulaEscaneada = qrCodeMessage.trim();

            // Mostrar el resultado en pantalla
            let resDiv = document.getElementById("resultado");
            resDiv.innerText = "Documento detectado: " + cedulaEscaneada;
            resDiv.style.display = "block";

            // Detener la cámara ya que obtuvimos el dato
            scanner.stop().then(() => {
                // Habilitar los botones de Ingreso/Salida
                document.getElementById("acciones-acceso").style.display = "block";
            }).catch(err => console.error("Error al detener el scanner", err));
        },
        (errorMessage) => {
            // Errores de búsqueda de QR repetitivos (ignorar para no saturar la consola)
        }
    ).catch(err => {
        alert("No se pudo iniciar la cámara. Asegúrate de dar los permisos.");
        console.error(err);
    });
}

function registrarAcceso(tipo) {
    if (!cedulaEscaneada) {
        alert("Error: No hay datos de documento válidos.");
        return;
    }

    // Enviamos los datos hacia insert_acceso.php
    fetch('acceso.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'cedula=' + encodeURIComponent(cedulaEscaneada) + '&tipo=' + encodeURIComponent(tipo)
    })
    // Forzamos text() primero en caso de que tu PHP envíe un error de warning en texto antes del JSON
    .then(response => response.text()) 
    .then(text => {
        try {
            const data = JSON.parse(text);
            alert(data.message);
            if (data.success) {
                // Limpieza post-registro exitoso
                cedulaEscaneada = null;
                document.getElementById("resultado").style.display = "none";
                document.getElementById("acciones-acceso").style.display = "none";
                document.getElementById("qr-container").style.display = "none";
            }
        } catch (err) {
            console.error("Respuesta no es JSON válido:", text);
            alert("Error en la respuesta del servidor.");
        }
    })
    .catch(error => {
        console.error('Error en la petición Fetch:', error);
        alert('Error de conexión al registrar el acceso.');
    });
}
</script>

</body>
</html>
