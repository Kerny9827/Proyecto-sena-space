<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="img/icono3.png">
    <title>LOG-IN - Olvido de Contraseña</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <link href="css/custom.css" rel="stylesheet">

</head>

<body class="bg-gradient-sena body-forgot-password">
    

    <div class="container" >
        
        <!-- Outer Row -->
        <div class="row justify-content-center">
            

            <div class="col-lg-10">

                <div class="card o-hidden border-0 shadow-lg my-5 card-custom">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <!-- Logo con animación -->
                            <div class="col-md-4 d-flex justify-content-center align-items-center">
                                <a href="Login.html">
                                    <img src="img/fondo.png" style="max-width: 250px; height: auto;" alt="Logo LOG-IN">
                                    
                                </a>
                            </div>

                            <!-- Formulario -->
                            <div class="col-lg-7">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-2">¿Olvidaste tu contraseña?</h1>
                                        <p class="mb-4">Ingresa tu correo y generaremos un código de recuperación.</p>
                                    </div>
                                    <form class="user" id="resetForm">
                                        <div class="form-group">
                                            <input type="email" class="form-control form-control-user"
                                                id="exampleInputEmail" placeholder="Ingresa tu correo..." required>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Restablecer Contraseña
                                        </button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="Register.html">¡Crear una cuenta!</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="Login.html">¿Ya tienes una cuenta? ¡Inicia sesión!</a>
                                    </div>
                                    <!-- Aquí aparecerá el mensaje -->
                                    <div id="message" class="text-center mt-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>

    <!-- Validación y mensaje -->
    <script>
        document.getElementById("resetForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let email = document.getElementById("exampleInputEmail").value;
            let messageBox = document.getElementById("message");

            if (!email.includes("@")) {
                messageBox.innerHTML = "<p class='text-danger'>❌ Por favor, ingresa un correo válido.</p>";
                return;
            }

            // Si es válido
            messageBox.innerHTML = "<p class='text-success'>✅ Te hemos enviado un enlace de recuperación a tu correo.</p>";

            // Opcional: borrar el mensaje después de 5 segundos
            setTimeout(() => {
                messageBox.innerHTML = "";
            }, 5000);
        });
    </script>

</body>
</html>
