<body class="bg-gradient-sena body-forgot-password">
    <div class="container" >
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card o-hidden border-0 shadow-lg my-5 card-custom">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-md-4 d-flex justify-content-center align-items-center">
                                <a href="Login.html">
                                    <img src="img/fondo.png" style="max-width: 250px; height: auto;" alt="Logo LOG-IN">
                                    
                                </a>
                            </div>
                            <!-- Formulario -->
                            <div class="col-lg-7">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h3 text-gray-900 mb-2">Olvidaste tu contraseña?</h1>
                                        <p class="mb-4">Ingresa tu correo para generar tu código.</p>
                                    </div>
                                    <form method="post" action="Forgot-password.php">
                                        <div class="form-group">
                                            <label for="email">Correo:</label>
                                            <input type="email" name="email" id="email" placeholder="Ingresa tu correo..." required class="form-control form-control-user" >
                                        </div>
                                        
                                        <button  type="submit" class="btn btn-primary btn-user btn-block" >Restablecer Contraseña</button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="Register.html">¡Crear una cuenta!</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="Login.html">¿Ya tienes una cuenta? ¡Inicia sesión!</a>
                                    </div>
                                    <div id="message" class="text-center mt-3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <!-- Validación y mensaje -->
    <script>
        document.getElementById("resetForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let email = document.getElementById("exampleInputEmail").value;
            let messageBox = document.getElementById("message");

            if (!email.includes("@")) {
                messageBox.innerHTML = "<p class='text-danger'>❌ Por favor, ingresa un correo válido.</p>";
                return;
            }

            // Si es válido
            messageBox.innerHTML = "<p class='text-success'>✅ Te hemos enviado un enlace de recuperación a tu correo.</p>";

            // Opcional: borrar el mensaje después de 5 segundos
            setTimeout(() => {
                messageBox.innerHTML = "";
            }, 5000);
        });
    </script>
