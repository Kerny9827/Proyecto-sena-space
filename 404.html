<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso con QR - Talanquera Sena Space</title>

  <link rel="icon" href="img/icono3.png" />
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,700,900" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <link href="css/custom.css" rel="stylesheet" />
</head>
<body class="page-404 bg-gradient-sena">
  <div class="container">
    <img src="img/fondo.png" alt="Logo" class="logo" />
    <h2>QR de Acceso Diario</h2>

    <!-- QR generado -->
    <div id="qrcode"></div>
    <div id="info"></div>

    <a href="registro.html" class="crear-cuenta">¡Crear cuenta!</a>
  </div>

  <script>
    // Simulación de usuario por defecto
    if (!localStorage.getItem("userEmail")) {
      localStorage.setItem("userName", "Carlos Pérez");
      localStorage.setItem("userEmail", "carlos@test.com");
      localStorage.setItem("userPassword", "123456");
    }

    // Obtener fecha actual
    function obtenerFechaActual() {
      const hoy = new Date();
      const año = hoy.getFullYear();
      const mes = String(hoy.getMonth() + 1).padStart(2, '0');
      const dia = String(hoy.getDate()).padStart(2, '0');
      return `${año}-${mes}-${dia}`;
    }

    // Generar contenido del QR
    function generarContenidoQR() {
      const email = localStorage.getItem("userEmail");
      const fecha = obtenerFechaActual();
      return JSON.stringify({ email: email, fecha: fecha });
    }

    // Generar visualmente el QR
    function generarQR() {
      const contenido = generarContenidoQR();
      const qrcodeContainer = document.getElementById("qrcode");
      qrcodeContainer.innerHTML = "";

      QRCode.toCanvas(document.createElement("canvas"), contenido, { width: 200 }, function (err, canvas) {
        if (err) console.error(err);
        qrcodeContainer.appendChild(canvas);
        document.getElementById("info").textContent = "QR válido solo para el día: " + obtenerFechaActual();
      });
    }

    // Mostrar QR al cargar
    generarQR();

    // Verifica a medianoche y actualiza QR
    setInterval(() => {
      const ahora = new Date();
      if (ahora.getHours() === 0 && ahora.getMinutes() === 0) {
        generarQR();
      }
    }, 60000);
  </script>
</body>
</html>
