<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="img/icono3.png">
    <title>Sena Space - Registro</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">

</head>

<body class="bg-gradient-sena">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">

                            <div class="col-md-4 d-flex justify-content-center align-items-center" style="width: 40%; display: flex; align-items: center; justify-content: center; background-color: #f5f5f5;">
                                <a href="login.html">
                                    <img src="img/fondo.png" class="logo-large animate__animated animate__pulse animate__infinite" alt="Logo Sena Space">
                                </a>
                            </div>

                            <div class="col-md-8">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Crear una cuenta</h1>
                                    </div>

                                    <form class="user" id="registerForm" action="register.php" method="post">
                                        <div class="form-group">
                                            <input type="text" name="registerName" class="form-control form-control-user" id="registerName"
                                                placeholder="Nombre completo" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="email" name="registerEmail" class="form-control form-control-user"
                                                id="registerEmail" placeholder="Correo" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" name="registerPassword" class="form-control form-control-user"
                                                id="registerPassword" placeholder="Contraseña" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" name="confirmPassword" class="form-control form-control-user"
                                                id="confirmPassword" placeholder="Confirmar contraseña" required>
                                        </div>

                                        <div class="form-group">
                                            <select class="form-control" id="tipoDocumento" name="tipo_documento" style="border-radius: 50px; height: 50px;" required>
                                                <option value="" disabled selected>Tipo de documento</option>
                                                <option value="Cedula">Cédula</option>
                                                <option value="Tarjeta de identidad">Tarjeta de identidad</option>
                                                <option value="PPT - Pasaporte">PPT - Pasaporte</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <input type="text" name="cedula" class="form-control form-control-user"
                                                id="Cedula" placeholder="Ingrese numero de documento" required>
                                        </div>
                                        <div class="form-group">
                                            <select class="form-control" id="userType" name="userType" style="border-radius: 50px; height: 50px;" required>
                                                <option value="" disabled selected>Seleccione su rol</option>
                                                <option value="Aprendiz">Aprendiz</option>
                                                <option value="Instructor">Instructor</option>
                                                <option value="Seguridad">Seguridad</option>
                                                <option value="Varios">Varios</option>
                                                <option value="Cafetería">Cafetería</option>
                                                <option value="Visitante">Visitante</option>
                                            </select>
                                        </div>

                                        <p id="selectedUserType" class="text-primary font-weight-bold"></p>

                                        <button type="submit" class="btn btn-success btn-user btn-block">
                                            Registrar cuenta
                                        </button>
                                    </form>

                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="login.html">¿Ya tienes una cuenta? Inicia sesión</a>
                                    </div>
                                </div>
                            </div>
                            <!-- Fin Formulario -->

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Registro -->
    <script>
        document.getElementById("userType").addEventListener("change", function () {
            let selected = this.value;
            document.getElementById("selectedUserType").textContent = "Rol: " + selected;
        });

        document.getElementById("registerForm").addEventListener("submit", function () {
            let name = document.getElementById("registerName").value.trim();
            let email = document.getElementById("registerEmail").value.trim();
            let password = document.getElementById("registerPassword").value;
            let confirmPassword = document.getElementById("confirmPassword").value;
            let userType = document.getElementById("userType").value;
            let tipoDocumento = document.getElementById("tipoDocumento").value;
            let cedula = document.getElementById("Cedula").value.trim();

            if (!name || !email || !password || !confirmPassword || !tipoDocumento || !cedula || !userType) {
                alert("Por favor completa todos los campos.");
                return false;
            }

            if (password !== confirmPassword) {
                alert("Las contraseñas no coinciden.");
                return false;
            }

            return true; // permitir envío al servidor
        });
    </script>

</body>
</html>
