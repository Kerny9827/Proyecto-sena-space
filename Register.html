<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="img/icono3.png">
    <title>LOG-IN - Registro</title>
    

    <!-- Fonts -->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link href="css/sb-admin-2.min.css" rel="stylesheet" />
    <link href="css/custom.css" rel="stylesheet" />

    <!-- QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

   
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card register-card">
            <div class="card-body p-0">
              <div class="row no-gutters">
                <!-- Panel izquierdo corporativo con identidad visual -->
                <div class="col-md-4 left-panel">
                  <a href="Login.html">
                    <img src="img/fondo.png" class="logo-large" alt="LOG-IN" />
                  </a>
                </div>

                <div class="col-md-8 form-panel"><!-- Formulario de registro de usuarios -->
                  <div class="p-5">
                    <div class="text-center mb-4">
                      <h1 class="h3 text-gray-900">Crear una cuenta</h1>

                      <p class="text-muted">
                        Registra tus datos para generar tu QR personal
                      </p>
                    </div>

                    <form
                      class="user"
                      id="registerForm"
                      action="register.php"
                      method="post"
                    >
                      <div class="form-group">
                        <input
                          type="text"
                          name="registerName"
                          class="form-control"
                          id="registerName"
                          placeholder="Nombre"
                          placeholder="Apellido"
                          required
                        />
                      </div>

                       <div class="form-group">
                        <input
                          type="text"
                          name="registerName"
                          class="form-control"
                          id="registerName"
                          placeholder="Apellido"
                          placeholder="Apellido"
                          required
                        />
                      </div>


                      <div class="form-group">
                        <input
                          type="email"
                          name="registerEmail"
                          class="form-control"
                          id="registerEmail"
                          placeholder="Correo electrónico"
                          required
                        />
                      </div>

                      <div class="form-group">
                        <input
                          type="password"
                          name="registerPassword"
                          class="form-control"
                          id="registerPassword"
                          placeholder="Contraseña"
                          required
                        />
                      </div>

                      <div class="form-group">
                        <input
                          type="password"
                          name="confirmPassword"
                          class="form-control"
                          id="confirmPassword"
                          placeholder="Confirmar contraseña"
                          required
                        />
                      </div>

                      <!-- DOCUMENTO -->

                      <div class="form-group">
                        <select
                          class="custom-select"
                          id="tipoDocumento"
                          name="tipo_documento"
                          required
                        >
                          <option value="" disabled selected>
                            Tipo de documento
                          </option>

                          <option value="Cédula">Cédula</option>

                          <option value="Tarjeta de identidad">
                            Tarjeta de identidad
                          </option>

                          <option value="Pasaporte">Pasaporte</option>
                        </select>

                        <div id="selectedDocumento" class="selected-box"></div>
                      </div>

                      <!-- NUMERO -->

                      <div class="form-group">
                        <input
                          type="text"
                          class="form-control"
                          id="Cedula"
                          name="cedula"
                          placeholder="Número de documento"
                          required
                        />
                      </div>

                      <!-- ROL -->

                      <div class="form-group">
                        <select
                          class="custom-select"
                          id="userType"
                          name="userType"
                          required
                        >
                          <option value="" disabled selected>
                            Seleccione su rol
                          </option>

                          <option value="Aprendiz">Aprendiz</option>

                          <option value="Instructor">Instructor</option>

                          <option value="Seguridad">Seguridad</option>

                          <option value="Cafetería">Cafetería</option>

                          <option value="Visitante">Visitante</option>
                        </select>

                        <div id="selectedUserType" class="selected-box"></div>
                      </div>

                      <button
                        type="submit"
                        class="btn btn-success btn-register btn-block"
                      >
                        <i class="fas fa-user-plus"></i>
                        Registrar cuenta
                      </button>
                    </form>

                    <!-- QR -->

                    <div id="qrContainer">
                      <h4 class="mt-4">QR Personal Generado</h4>

                      <canvas id="qrCanvas"></canvas>

                      <div class="qr-info">
                        Este QR contiene toda la información del usuario
                        registrado.
                      </div>
                    </div>

                    <hr />

                    <div class="text-center">
                      <a class="small" href="Login.html">
                        ¿Ya tienes una cuenta? Inicia sesión
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPT -->

    <script>
      // MOSTRAR OPCION SELECCIONADA

      const userType = document.getElementById("userType");
      const selectedUserType = document.getElementById("selectedUserType");

      userType.addEventListener("change", function () {
        selectedUserType.style.display = "block";

        selectedUserType.innerHTML = `<i class="fas fa-check-circle"></i>
                Rol seleccionado:
                <b>${this.value}</b>`;
      });

      const tipoDocumento = document.getElementById("tipoDocumento");
      const selectedDocumento = document.getElementById("selectedDocumento");

      tipoDocumento.addEventListener("change", function () {
        selectedDocumento.style.display = "block";

        selectedDocumento.innerHTML = `<i class="fas fa-id-card"></i>
                Documento seleccionado:
                <b>${this.value}</b>`;
      });

      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let name = document.getElementById("registerName").value.trim();

          let email = document.getElementById("registerEmail").value.trim();

          let password = document.getElementById("registerPassword").value;

          let confirmPassword =
            document.getElementById("confirmPassword").value;

          let role = document.getElementById("userType").value;

          let tipoDoc = document.getElementById("tipoDocumento").value;

          let cedula = document.getElementById("Cedula").value.trim();

          if (
            !name ||
            !email ||
            !password ||
            !confirmPassword ||
            !role ||
            !tipoDoc ||
            !cedula
          ) {
            alert("Completa todos los campos.");
            return;
          }

          if (password !== confirmPassword) {
            alert("Las contraseñas no coinciden.");
            return;
          }

          this.submit();

          // DATOS DEL QR

          const qrData = `
            LOG-IN USER
            ------------------------
            Nombre: ${name}
            Correo: ${email}
            Documento: ${tipoDoc}
            Número: ${cedula}
            Rol: ${role}
            Registro: ${new Date().toLocaleString()}
            `;

          // MOSTRAR QR

          document.getElementById("qrContainer").style.display = "block";

          QRCode.toCanvas(document.getElementById("qrCanvas"), qrData, {
            width: 280,
            margin: 2,
          });

          localStorage.setItem("userName", name);
          localStorage.setItem("userRole", role);
          localStorage.setItem("userQR", qrData);

          alert("Cuenta registrada correctamente.");
        });

          // REGISTRO + QR

        document.getElementById("registerForm")
            .addEventListener("submit", function (e) {

            e.preventDefault();

            let name =
                document.getElementById("registerName").value.trim();

            let email =
                document.getElementById("registerEmail").value.trim();

            let password =
                document.getElementById("registerPassword").value;

            let confirmPassword =
                document.getElementById("confirmPassword").value;

            let role =
                document.getElementById("userType").value;

            let tipoDoc =
                document.getElementById("tipoDocumento").value;

            let cedula =
                document.getElementById("Cedula").value.trim();

            if (!name || !email || !password || !confirmPassword
                || !role || !tipoDoc || !cedula) {

                alert("Completa todos los campos.");
                return;

            }

            if (password !== confirmPassword) {

                alert("Las contraseñas no coinciden.");
                return;

            }

            // DATOS DEL QR

            const qrData = `
            LOG-IN USER
            ------------------------
            Nombre: ${name}
            Correo: ${email}
            Documento: ${tipoDoc}
            Número: ${cedula}
            Rol: ${role}
            Registro: ${new Date().toLocaleString()}
            `;

            // MOSTRAR QR

            document.getElementById("qrContainer")
                .style.display = "block";

            QRCode.toCanvas(
                document.getElementById("qrCanvas"),
                qrData,
                {
                    width: 280,
                    margin: 2
                }
            );

            // GUARDAR EN LOCALSTORAGE

            localStorage.setItem("userName", name);
            localStorage.setItem("userRole", role);
            localStorage.setItem("userQR", qrData);

            alert("Cuenta registrada correctamente.");

        });
    </script>
  </body>
</html>
